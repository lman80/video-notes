name: Build & Release

# Build installers for macOS and Windows. Push a version tag (e.g. v1.0.0) to
# cut a GitHub Release with both installers attached, or run it manually from
# the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Installs deps; ffmpeg-static's postinstall fetches the binary for THIS
      # runner's OS/arch, so each installer bundles the correct ffmpeg.
      - run: npm ci

      - name: Build ${{ matrix.platform }} installer
        run: npm run build:${{ matrix.platform }}
        env:
          # Personal/unsigned build — don't attempt code signing in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video-notes-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: ignore

      - name: Attach installers to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.exe
